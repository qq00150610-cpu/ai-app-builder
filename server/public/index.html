<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI应用开发平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#f5f5f5;min-height:100vh}
.header{background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;color:#fff;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;margin-bottom:5px}
.content{padding:15px}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card h2{font-size:16px;color:#333;margin-bottom:12px}
.quota{display:flex;justify-content:space-around;background:#f0f7ff;padding:15px;border-radius:8px}
.quota-item{text-align:center}
.quota-num{font-size:28px;font-weight:bold;color:#667eea}
.quota-label{font-size:11px;color:#666;margin-top:4px}
.input-group{margin-bottom:15px}
.input-group label{display:block;font-size:13px;color:#666;margin-bottom:6px}
.input-group input,.input-group textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.input-group textarea{min-height:120px}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:disabled{background:#ccc}
.tabs{display:flex;background:#fff;border-radius:8px;margin-bottom:15px;overflow:hidden}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#667eea;border-bottom-color:#667eea;background:#f0f7ff}
.project-item{display:flex;align-items:center;padding:15px;background:#f9f9f9;border-radius:8px;margin-bottom:10px}
.project-icon{width:45px;height:45px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;margin-right:12px}
.project-info{flex:1}
.project-name{font-size:15px;font-weight:600;color:#333}
.project-time{font-size:11px;color:#999;margin-top:3px}
.status-done{background:#e8f5e9;color:#4CAF50;font-size:11px;padding:4px 10px;border-radius:4px}
.empty{text-align:center;padding:50px 20px;color:#999}
.empty-icon{font-size:50px;margin-bottom:15px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:12px;width:90%;max-width:400px}
.loading{text-align:center;padding:40px}
.spinner{width:50px;height:50px;border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.result-box{background:#f0f7ff;border-radius:8px;padding:15px;margin-top:15px}
.code-preview{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:6px;font-size:11px;overflow-x:auto;max-height:150px;margin-top:10px}
.member-banner{background:linear-gradient(135deg,#ffd700,#ffaa00);border-radius:8px;padding:15px;color:#333;display:flex;align-items:center;justify-content:space-between}
.member-btn{background:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;z-index:300;display:none}
</style>
</head>
<body>
<div class="header">
<h1>🚀 AI应用开发平台</h1>
<p style="opacity:0.8">免费用户每周5个应用</p>
</div>
<div class="content">
<div class="card">
<div class="quota">
<div class="quota-item"><div class="quota-num" id="usedCount">0</div><div class="quota-label">本周已用</div></div>
<div class="quota-item"><div class="quota-num" id="remainCount">5</div><div class="quota-label">剩余次数</div></div>
<div class="quota-item"><div class="quota-num">5</div><div class="quota-label">每周限额</div></div>
</div>
</div>
<div class="tabs">
<div class="tab active" onclick="switchTab(0)">✨ 创建应用</div>
<div class="tab" onclick="switchTab(1)">📦 我的应用</div>
</div>
<div id="tab0">
<div class="card">
<h2>🤖 AI智能生成</h2>
<div class="input-group">
<label>应用名称</label>
<input type="text" id="appName" placeholder="例如：我的工具箱">
</div>
<div class="input-group">
<label>应用描述（越详细越好）</label>
<textarea id="appDesc" placeholder="描述你想要的应用功能&#10;&#10;例如：&#10;- 产品展示应用，显示图片名称价格&#10;- 日记应用，记录每日心情&#10;- 记账应用，统计收支"></textarea>
</div>
<button class="btn btn-primary" onclick="generateApp()">🚀 生成应用</button>
</div>
<div class="card" id="resultCard" style="display:none">
<h2>✅ 生成成功</h2>
<div class="result-box">
<div style="font-size:13px;color:#666">点击下方按钮打包APK</div>
<pre class="code-preview" id="codePreview"></pre>
</div>
<button class="btn btn-primary" onclick="buildApp()">📦 打包APK</button>
</div>
</div>
<div id="tab1" style="display:none">
<div class="card" id="projectList">
<div class="empty"><div class="empty-icon">📭</div><div>暂无应用</div></div>
</div>
</div>
<div class="member-banner">
<div><strong>👑 升级会员</strong><br><small>年度¥9.9 | 永久¥99</small></div>
<button class="member-btn">开通</button>
</div>
</div>
<div class="modal" id="loadingModal">
<div class="modal-content"><div class="loading"><div class="spinner"></div><div id="loadingText">处理中...</div></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var token=localStorage.getItem('token');
var currentProject=null;
function switchTab(t){
document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('active',i===t));
document.getElementById('tab0').style.display=t===0?'block':'none';
document.getElementById('tab1').style.display=t===1?'block':'none';
if(t===1)loadProjects();
}
function showLoading(t){document.getElementById('loadingText').textContent=t;document.getElementById('loadingModal').classList.add('show')}
function hideLoading(){document.getElementById('loadingModal').classList.remove('show')}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},2000)}
function getHeaders(){var h={'Content-Type':'application/json'};if(token)h['Authorization']='Bearer '+token;return h}
function generateApp(){
var name=document.getElementById('appName').value.trim();
var desc=document.getElementById('appDesc').value.trim();
if(!name){showToast('请输入应用名称');return}
if(!desc){showToast('请输入应用描述');return}
showLoading('AI生成中...');
fetch('/api/ai/generate-page',{method:'POST',headers:getHeaders(),body:JSON.stringify({description:desc})})
.then(r=>r.json()).then(d=>{hideLoading();if(d.success){currentProject={name:name,description:desc,config:d.data};document.getElementById('resultCard').style.display='block';document.getElementById('codePreview').textContent=JSON.stringify(d.data,null,2);showToast('生成成功');updateQuota()}else showToast(d.message||'失败')})
.catch(e=>{hideLoading();showToast('网络错误')});
}
function buildApp(){
if(!currentProject){showToast('请先生成');return}
showLoading('提交打包...');
fetch('/api/project/create',{method:'POST',headers:getHeaders(),body:JSON.stringify({name:currentProject.name,description:currentProject.description,config:currentProject.config})})
.then(r=>r.json()).then(d=>{if(d.success)return fetch('/api/build/submit',{method:'POST',headers:getHeaders(),body:JSON.stringify({project_id:d.data.id,app_name:currentProject.name,package_name:'com.aiapp.'+Date.now()})});throw new Error(d.message)})
.then(r=>r.json()).then(d=>{hideLoading();if(d.success){showToast('已提交!');document.getElementById('resultCard').style.display='none';document.getElementById('appName').value='';document.getElementById('appDesc').value='';currentProject=null;updateQuota();setTimeout(function(){switchTab(1)},1000)}else showToast(d.message)})
.catch(e=>{hideLoading();showToast(e.message||'错误')});
}
function loadProjects(){
fetch('/api/project/list',{headers:getHeaders()}).then(r=>r.json()).then(d=>{
var l=document.getElementById('projectList');
if(!d.success||!d.data.list.length){l.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div>暂无应用</div></div>';return}
var h='';d.data.list.forEach(function(p){h+='<div class="project-item"><div class="project-icon">📱</div><div class="project-info"><div class="project-name">'+p.name+'</div><div class="project-time">'+new Date(p.created_at).toLocaleDateString()+'</div></div><span class="status-done">完成</span></div>'});l.innerHTML=h});
}
function updateQuota(){
fetch('/api/user/usage',{headers:getHeaders()}).then(r=>r.json()).then(d=>{if(d.success){var u=d.data.today_build||0;document.getElementById('usedCount').textContent=u;document.getElementById('remainCount').textContent=Math.max(0,5-u)}});
}
updateQuota();
</script>
</body>
</html>
